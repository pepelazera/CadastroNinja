spring.application.name = CadastroNinjas


# Esses dois comandos servem para dizer que, quando eu fechar meu banco de dados, quero que as informaçőes que inseri continuem salvas nele

spring.datasource.url = jdbc:h2:mem:testdb; DB_CLOSE_DELAY = -1; DB_CLOSE_ON_EXIT = false;
spring.datasource.driver-class-name = org.h2.Driver
spring.datasource.username = cadastro_db
spring.datasource.password = 12345
spring.jpa.database-platform = org.hibernate.dialect.H2Dialect

# Configuraçőes do JPA // HIBERNATES
spring.jpa.hibernate.ddl-auto = update
spring.jpa.show-sql = true
spring.h2.console.enabled = true